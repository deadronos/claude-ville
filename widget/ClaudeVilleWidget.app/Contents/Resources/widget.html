<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320, initial-scale=1.0">
  <title>ClaudeVille Widget</title>
  <link rel="stylesheet" href="widget.css">
</head>
<body>
  <div class="widget" id="widget">

    <!-- 헤더 -->
    <div class="header">
      <div class="header-title">ClaudeVille</div>
      <div class="stats-row">
        <div class="badges" id="badges">
          <div class="badge">
            <span class="badge-dot working"></span>
            <span id="working-count" class="badge-count">0</span>
            <span>working</span>
          </div>
          <div class="badge">
            <span class="badge-dot idle"></span>
            <span id="idle-count" class="badge-count">0</span>
            <span>idle</span>
          </div>
        </div>
        <div class="meta-stats">
          <span class="meta-tokens" id="total-tokens">0 tokens</span>
          <span class="meta-cost" id="total-cost">$0.00</span>
        </div>
      </div>
    </div>

    <!-- 계정/Quota 섹션 -->
    <div class="quota-section" id="quota-section">
      <div class="quota-info">
        <span id="quota-tier" class="quota-tier"></span>
        <span id="quota-activity" class="quota-activity"></span>
      </div>
      <div id="quota-bars" class="quota-bars" style="display: none;">
        <div class="quota-bar-row">
          <span class="quota-bar-label">5H</span>
          <div class="quota-bar-track">
            <div id="quota-5h-fill" class="quota-bar-fill"></div>
          </div>
          <span id="quota-5h-pct" class="quota-bar-pct">0%</span>
        </div>
        <div class="quota-bar-row">
          <span class="quota-bar-label">7D</span>
          <div class="quota-bar-track">
            <div id="quota-7d-fill" class="quota-bar-fill"></div>
          </div>
          <span id="quota-7d-pct" class="quota-bar-pct">0%</span>
        </div>
      </div>
    </div>

    <!-- 에이전트 목록 -->
    <div class="agent-list-wrap" id="agent-list-wrap">
      <div class="empty-wrap" id="empty-state">
        <span class="empty-text">에이전트 없음</span>
      </div>
    </div>

    <!-- 푸터 -->
    <div class="footer">
      <button class="open-dashboard-btn" id="open-dashboard-btn">
        Open Dashboard
        <span class="btn-arrow">↗</span>
      </button>
    </div>

  </div>

  <script>
    const WS_URL = 'ws://localhost:3030';
    const RECONNECT_INTERVAL = 3000;

    let ws = null;
    let reconnectTimer = null;
    let isOnline = false;

    // ── 유틸 ──────────────────────────────────────────────
    function formatTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return String(n);
    }

    function formatCost(n) {
      return '$' + n.toFixed(2);
    }

    function getStatusLabel(status) {
      const map = {
        working: 'Working...',
        idle: 'Idle',
        waiting: 'Waiting...',
      };
      return map[status] || status;
    }

    function getModelLabel(model) {
      const map = {
        opus: 'opus',
        sonnet: 'sonnet',
        haiku: 'haiku',
      };
      return map[model] || (model || '?');
    }

    // ── badge 업데이트 (Swift 통신) ───────────────────────
    function postBadge(working, total) {
      try {
        webkit.messageHandlers.badge.postMessage({ working, total });
      } catch (_) { /* 브라우저 테스트 환경 */ }
    }

    // ── UI 렌더링 ─────────────────────────────────────────
    function renderAgents(sessions) {
      const wrap = document.getElementById('agent-list-wrap');

      if (!isOnline) {
        wrap.innerHTML = `
          <div class="offline-wrap">
            <div class="offline-icon">⚡</div>
            <div class="offline-text">SERVER OFFLINE</div>
            <div class="offline-retry">Reconnecting...</div>
          </div>`;
        document.getElementById('working-count').textContent = '0';
        document.getElementById('idle-count').textContent = '0';
        document.getElementById('total-tokens').textContent = '0 tokens';
        document.getElementById('total-cost').textContent = '$0.00';
        postBadge(0, 0);
        return;
      }

      if (!sessions || sessions.length === 0) {
        wrap.innerHTML = `
          <div class="empty-wrap">
            <span class="empty-text">에이전트 없음</span>
          </div>`;
        document.getElementById('working-count').textContent = '0';
        document.getElementById('idle-count').textContent = '0';
        document.getElementById('total-tokens').textContent = '0 tokens';
        document.getElementById('total-cost').textContent = '$0.00';
        postBadge(0, sessions.length);
        return;
      }

      // 통계
      let workingCount = 0;
      let idleCount = 0;
      let totalTokens = 0;
      let totalCost = 0;

      sessions.forEach(s => {
        if (s.status === 'working') workingCount++;
        else idleCount++;
        if (s.tokenUsage) {
          totalTokens += (s.tokenUsage.input || 0) + (s.tokenUsage.output || 0)
            + (s.tokenUsage.cacheRead || 0) + (s.tokenUsage.cacheWrite || 0);
        }
        totalCost += s.estimatedCost || 0;
      });

      document.getElementById('working-count').textContent = workingCount;
      document.getElementById('idle-count').textContent = idleCount;
      document.getElementById('total-tokens').textContent = formatTokens(totalTokens) + ' tokens';
      document.getElementById('total-cost').textContent = formatCost(totalCost);

      postBadge(workingCount, sessions.length);

      // 목록 렌더
      const items = sessions
        .sort((a, b) => {
          const order = { working: 0, waiting: 1, idle: 2 };
          return (order[a.status] ?? 9) - (order[b.status] ?? 9);
        })
        .map(s => {
          const statusClass = s.status || 'idle';
          const name = s.name || s.sessionId?.slice(0, 8) || 'Unknown';
          const model = getModelLabel(s.model);
          const activity = getStatusLabel(s.status);
          return `
            <div class="agent-item">
              <span class="agent-dot ${statusClass}"></span>
              <div class="agent-info">
                <div class="agent-name">${escHtml(name)}</div>
                <div class="agent-activity">${escHtml(activity)}</div>
              </div>
              <span class="agent-model">${escHtml(model)}</span>
            </div>`;
        })
        .join('');

      wrap.innerHTML = items;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Quota 렌더링 ──────────────────────────────────────
    function renderQuota(usage) {
      if (!usage) return;

      const tierEl = document.getElementById('quota-tier');
      const activityEl = document.getElementById('quota-activity');

      if (usage.account) {
        tierEl.textContent = formatTier(usage.account.rateLimitTier, usage.account.subscriptionType);
      }

      if (usage.activity && usage.activity.today) {
        const t = usage.activity.today;
        activityEl.textContent = formatTokens(t.messages) + ' msgs / ' + t.sessions + ' sessions';
      }

      if (usage.quotaAvailable && usage.quota) {
        const barsEl = document.getElementById('quota-bars');
        barsEl.style.display = 'flex';
        updateQuotaBar('quota-5h-fill', 'quota-5h-pct', usage.quota.fiveHour);
        updateQuotaBar('quota-7d-fill', 'quota-7d-pct', usage.quota.sevenDay);
      }
    }

    function formatTier(rateLimitTier, subscriptionType) {
      if (rateLimitTier) {
        const match = rateLimitTier.match(/max_(\d+x)/i);
        if (match) return 'Max ' + match[1];
      }
      if (subscriptionType) {
        return subscriptionType.charAt(0).toUpperCase() + subscriptionType.slice(1);
      }
      return 'Free';
    }

    function updateQuotaBar(fillId, pctId, value) {
      if (value == null) return;
      const pct = Math.round(value * 100);
      const fillEl = document.getElementById(fillId);
      const pctEl = document.getElementById(pctId);
      fillEl.style.width = pct + '%';
      pctEl.textContent = pct + '%';
      fillEl.className = 'quota-bar-fill';
      if (pct >= 80) fillEl.classList.add('quota-bar-fill--danger');
      else if (pct >= 50) fillEl.classList.add('quota-bar-fill--warn');
    }

    // ── WebSocket ─────────────────────────────────────────
    function connect() {
      if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        isOnline = true;
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'init' || data.type === 'update') {
            renderAgents(data.sessions || []);
            if (data.usage) renderQuota(data.usage);
          }
        } catch (e) {
          console.error('WS parse error', e);
        }
      };

      ws.onclose = () => {
        isOnline = false;
        renderAgents([]);
        scheduleReconnect();
      };

      ws.onerror = () => {
        isOnline = false;
        renderAgents([]);
        ws.close();
      };
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, RECONNECT_INTERVAL);
    }

    // ── Open Dashboard ────────────────────────────────────
    document.getElementById('open-dashboard-btn').addEventListener('click', () => {
      try {
        webkit.messageHandlers.openDashboard.postMessage({});
      } catch (_) {
        // 브라우저 테스트 환경: 새 탭으로 열기
        window.open('http://localhost:3030', '_blank');
      }
    });

    // ── 초기화 ────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
