<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeVille - Agent Visualization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/character.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/activity-panel.css">
</head>
<body>
    <!-- Top bar -->
    <header id="topbar" class="topbar">
        <div class="topbar__left">
            <span class="topbar__logo">ClaudeVille</span>
            <span class="topbar__version">v0.1</span>
        </div>
        <div class="topbar__center">
            <div class="topbar__stat">
                <span data-i18n="time" class="topbar__stat-label">TIME</span>
                <span id="statTime" class="topbar__stat-value">00:00:00</span>
            </div>
            <div class="topbar__badges">
                <span class="topbar__badge topbar__badge--working">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeWorking">0</span> <span data-i18n="working">WORKING</span>
                </span>
                <span class="topbar__badge topbar__badge--idle">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeIdle">0</span> <span data-i18n="idle">IDLE</span>
                </span>
                <span class="topbar__badge topbar__badge--waiting">
                    <span class="topbar__badge-dot"></span>
                    <span id="badgeWaiting">0</span> <span data-i18n="waiting">WAITING</span>
                </span>
            </div>
        </div>
        <div class="topbar__right">
            <button id="btnModeCharacter" data-i18n="world" class="topbar__mode-btn topbar__mode-btn--active">WORLD</button>
            <button id="btnModeDashboard" data-i18n="dashboard" class="topbar__mode-btn">DASHBOARD</button>
            <button id="btnSettings" class="topbar__settings-btn" title="Settings">&#9881;</button>
        </div>
    </header>

    <!-- Main area -->
    <div class="main">
        <!-- Top: sidebar + content -->
        <div class="main__body">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar__header">
                    <span data-i18n="agents" class="sidebar__title">AGENTS</span>
                    <span id="agentCount" class="sidebar__count">0</span>
                </div>
                <div id="agentList" class="sidebar__list">
                    <!-- Agent items are added dynamically -->
                </div>
            </aside>

            <!-- Main content -->
            <div class="content">
                <!-- World mode -->
                <div id="characterMode" class="content__character">
                    <canvas id="worldCanvas" class="content__canvas"></canvas>
                </div>

                <!-- Dashboard mode -->
                <div id="dashboardMode" class="content__dashboard" style="display: none;">
                    <div id="dashboardGrid" class="dashboard__grid">
                        <!-- Agent cards are added dynamically -->
                    </div>
                    <div id="dashboardEmpty" class="dashboard__empty">
                        <span class="dashboard__empty-icon">~</span>
                        <span data-i18n="noActiveAgents" class="dashboard__empty-text">NO ACTIVE AGENTS</span>
                        <span data-i18n="noActiveAgentsSub" class="dashboard__empty-sub">Start a Claude Code session to see agents here</span>
                    </div>
                </div>
            </div>

            <!-- Right activity panel -->
            <aside id="activityPanel" class="activity-panel" style="display: none;">
                <div class="activity-panel__header">
                    <div class="activity-panel__agent-info">
                        <span id="panelAgentName" class="activity-panel__name"></span>
                        <span id="panelAgentStatus" class="activity-panel__status"></span>
                    </div>
                    <button id="panelClose" class="activity-panel__close">X</button>
                </div>
                <div class="activity-panel__meta">
                    <div class="activity-panel__meta-row">
                        <span class="activity-panel__label" data-i18n="model">MODEL</span>
                        <span id="panelModel" class="activity-panel__value"></span>
                    </div>
                    <div class="activity-panel__meta-row">
                        <span class="activity-panel__label">Provider</span>
                        <span id="panelProvider" class="activity-panel__value"></span>
                    </div>
                    <div class="activity-panel__meta-row">
                        <span class="activity-panel__label" data-i18n="role">ROLE</span>
                        <span id="panelRole" class="activity-panel__value"></span>
                    </div>
                    <div class="activity-panel__meta-row">
                        <span class="activity-panel__label" data-i18n="team">TEAM</span>
                        <span id="panelTeam" class="activity-panel__value"></span>
                    </div>
                </div>
                <div class="activity-panel__section">
                    <div class="activity-panel__section-title">Current Tool</div>
                    <div id="panelCurrentTool" class="activity-panel__current-tool">
                        <span class="activity-panel__tool-icon"></span>
                        <div class="activity-panel__tool-detail">
                            <span class="activity-panel__tool-name"></span>
                            <span class="activity-panel__tool-input"></span>
                        </div>
                    </div>
                </div>
                <div class="activity-panel__section activity-panel__section--grow">
                    <div class="activity-panel__section-title">Tool History</div>
                    <div id="panelToolHistory" class="activity-panel__tool-history"></div>
                </div>
                <div class="activity-panel__section">
                    <div class="activity-panel__section-title">Messages</div>
                    <div id="panelMessages" class="activity-panel__messages"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Modal container -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal__header">
                <span id="modalTitle" class="modal__title"></span>
                <button id="modalClose" class="modal__close">X</button>
            </div>
            <div id="modalContent" class="modal__content"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/runtime-config.js"></script>
    <script type="module" src="src/presentation/App.js"></script>
</body>
</html>
